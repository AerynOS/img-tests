# WSL Distribution Configuration
# Created by AerynOS build system

[Distribution]
Name=AerynOS WSL
Version=1.0
Architecture=x86_64
Description=WSL2 distribution based on AerynOS
IsoPath=
InstallDate=

[Options]
ReadOnly=false
DistributionType=WSL2

[Features]
WSL2=true
Virtualization=Basic (for Windows containers)
GUIApps=false

[Post-Install]
# User to create on first login
DefaultUser=aerynos
DefaultShell=/usr/bin/bash

# Services to enable
# WSL runs from Windows, no systemd init
# User can start what they want

[Usage Notes]
# Import in Windows:
# wsl --import <DistroName> <InstallPath> <TarballPath>

# Example:
# wsl --import AerynOS D:\WSL\AerynOS C:\Downloads\aerynos-wsl.tar.gz

# First login:
# wsl -d AerynOS
# login: aerynos
# password: aerynos123

# Update packages:
# sudo moss sync -u
# sudo moss install <package>

# Install additional user:
# sudo useradd -m yourname
# sudo passwd yourname
# sudo usermod -aG sudo yourname
# exec sudo su yourname
