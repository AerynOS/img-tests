# AerynOS WSL - Custom config

# Disable graphical target for WSL
# This prevents systemd from trying to start a display manager
[Desktop]
DisplayManager=disabled
GraphicalTarget=disabled

# Set hostname (if not set by DHCP)
[Network]
HostnameOverride=aerynos-wsl

# WSL-specific settings
[WSL]
Kernel=none
# Use host's kernel for best performance
# Kernel path: /boot/vmlinuz-<version>

# Resource limits for WSL2
[WSL2]
MemoryLimit=16G
ProcessCount=480
TmpDiskSize=50G

# Enable pointer integration
[Input]
PointerIntegration=enabled

# Mount host directories (optional)
[Mounts]
// Enable if you need host access
# HostDir /mnt/host/path wsl-opt none defaults 0 0

# Optimizations for WSL2
[Optimizations]
# Disable swap (WSL2 has its own pagefile)
Swap=disabled
# Disable journal (log to stderr instead)
Journal=disabled
